<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Centro Médico Virgen del Carmen</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            overflow:hidden;

            background:#0f4c81;

        }

        .pantalla{

            width:100%;
            height:100vh;

            position:relative;

        }

        .pantalla img{

            width:100%;
            height:100%;

            object-fit:cover;

        }

        .fondo{

            position:absolute;

            top:0;
            left:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,.25);

        }

        .contenido{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            text-align:center;

            color:white;

            width:100%;

        }

        h1{

            font-size:55px;

            margin-top:20px;

            text-shadow:2px 2px 10px black;

        }

        h2{

            font-size:28px;

            margin-top:10px;

            text-shadow:2px 2px 8px black;

        }

        p{

            font-size:22px;

            margin-top:10px;

        }

        .barra{

            width:420px;

            height:18px;

            margin:40px auto;

            border-radius:30px;

            background:white;

            overflow:hidden;

            box-shadow:0 5px 15px rgba(0,0,0,.4);

        }

        .progreso{

            width:0%;

            height:100%;

            background:#007bff;

            animation:cargar 3s linear forwards;

        }

        @keyframes cargar{

            from{

                width:0%;

            }

            to{

                width:100%;

            }

        }

        .texto{

            font-size:22px;

            font-weight:bold;

            animation:latido 1s infinite;

        }

        @keyframes latido{

            0%{

                transform:scale(1);

            }

            50%{

                transform:scale(1.08);

            }

            100%{

                transform:scale(1);

            }

        }

        .footer{

            position:absolute;

            bottom:25px;

            width:100%;

            text-align:center;

            color:white;

            font-size:18px;

        }

    </style>

</head>

<body>

<div class="pantalla">

    <img src="{{ url_for('static', filename='img/inicio.png') }}">

    <div class="fondo"></div>

    <div class="contenido">

        <h1>Centro Médico Virgen del Carmen</h1>

        <h2>Sistema Inteligente de Gestión Hospitalaria</h2>

        <p>Atención • Prevención • Tecnología</p>

        <div class="barra">

            <div class="progreso"></div>

        </div>

        <div class="texto">

            Cargando sistema...

        </div>

    </div>

    <div class="footer">

        © 2026 Centro Médico Virgen del Carmen

    </div>

</div>

<script>

setTimeout(function(){

    window.location.href="/login";

},3000);

</script>

</body>

</html>
