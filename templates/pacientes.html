Arc{% extends 'base.html' %}

{% block contenido %}

<h2>Pacientes registrados</h2>
<a href="/agregar_paciente"
class="btn btn-success mb-3">

Nuevo Paciente

</a>
<table class="table table-bordered">

    <tr>
        <th>ID</th>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Edad</th>
        <th>Sexo</th>
        <th>Teléfono</th>
    </tr>

    {% for p in pacientes %}

    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.cedula }}</td>
        <td>{{ p.nombre }}</td>
        <td>{{ p.edad }}</td>
        <td>{{ p.sexo }}</td>
        <td>{{ p.telefono }}</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
