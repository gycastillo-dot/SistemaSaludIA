<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
   <title>Centro Médico Virgen del Carmen</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body id="cuerpo">

{% if session.get('usuario') %}

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/dashboard">🏥 SaludIA</a>

        <div class="d-flex flex-wrap gap-3 align-items-center">
            <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
            <a href="/pacientes" class="btn btn-light btn-sm">Pacientes</a>
            <a href="/agregar_paciente" class="btn btn-light btn-sm">Nuevo Paciente</a>
            <a href="/citas" class="btn btn-light btn-sm">Citas</a>
            <a href="/agregar_cita" class="btn btn-light btn-sm">Nueva Cita</a>
            <a href="/historiales" class="btn btn-light btn-sm">Historiales</a>
            <a href="/prediccion" class="btn btn-warning btn-sm">IA Diabetes</a>
            <a href="/reportes" class="btn btn-light btn-sm">Reportes</a>
            <button type="button" onclick="cambiarModo()" id="btnModo" class="btn btn-dark btn-sm">🌙 Modo oscuro</button>
            <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

{% endif %}

{% block contenido %}
{% endblock %}

{% if session.get('usuario') %}
</div>
{% endif %}

<script>


function cambiarModo(){

    document.body.classList.toggle("modo-oscuro");

    if(document.body.classList.contains("modo-oscuro")){

        localStorage.setItem("modo","oscuro");

    }else{

        localStorage.setItem("modo","claro");

    }

    actualizarBoton();

}

function actualizarBoton(){

    let btn=document.getElementById("btnModo");

    if(!btn) return;

    if(document.body.classList.contains("modo-oscuro")){

        btn.innerHTML="☀️ Modo claro";

        btn.className="btn btn-light btn-sm";

    }else{

        btn.innerHTML="🌙 Modo oscuro";

        btn.className="btn btn-dark btn-sm";

    }

}

window.onload=function(){

    if(localStorage.getItem("modo")=="oscuro"){

        document.body.classList.add("modo-oscuro");

    }

    actualizarBoton();

}


</script>

</body>
</html>
